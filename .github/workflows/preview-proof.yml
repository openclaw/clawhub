name: Preview Proof

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Vercel preview URL to verify"
        required: false
        type: string
      expected_sha:
        description: "Expected git SHA for this proof run"
        required: false
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  preview-proof:
    name: preview-proof
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: Test

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Verify checked-out revision
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha || github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          echo "actual_sha=$actual_sha" >> "$GITHUB_ENV"
          if [[ -n "$EXPECTED_SHA" && "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "::error::Expected $EXPECTED_SHA but checked out $actual_sha"
            exit 1
          fi

      - uses: ./.github/actions/setup-bun

      - name: Resolve Vercel preview URL
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PREVIEW_URL: ${{ inputs.preview_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_PREVIEW_URL:-}" ]]; then
            echo "url=$INPUT_PREVIEW_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "::error::preview_url is required for workflow_dispatch runs"
            exit 1
          fi

          preview_url=""
          for attempt in {1..60}; do
            comments="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate)"
            preview_url="$(
              jq -r '
                [.[] | select(.user.login == "vercel[bot]") | .body]
                | reverse
                | map(
                    select(test("\\!\\[Ready\\]"))
                    | (try (match("\\[Preview\\]\\((https://[^)]+)\\)") | .captures[0].string) catch empty)
                  )
                | .[]
                | select(length > 0)
              ' <<< "$comments" | head -n 1
            )"
            if [[ -n "$preview_url" && "$preview_url" != "null" ]]; then
              echo "url=$preview_url" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done

          echo "::error::Timed out waiting for a ready Vercel preview URL on PR #${PR_NUMBER}"
          exit 1

      - name: Verify protected preview public routes
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          bun <<'TS'
          const previewUrl = process.env.PREVIEW_URL?.trim();
          const bypassSecret = process.env.VERCEL_AUTOMATION_BYPASS_SECRET?.trim();
          if (!previewUrl) throw new Error("PREVIEW_URL is required");
          if (!bypassSecret) throw new Error("VERCEL_AUTOMATION_BYPASS_SECRET is required");

          const base = new URL(previewUrl);
          const headers = { "x-vercel-protection-bypass": bypassSecret };

          async function fetchText(path: string) {
            const response = await fetch(new URL(path, base), { headers });
            if (!response.ok) {
              throw new Error(`${path} returned ${response.status} ${response.statusText}`);
            }
            return await response.text();
          }

          async function fetchJson(path: string) {
            const response = await fetch(new URL(path, base), {
              headers: { ...headers, accept: "application/json" },
            });
            if (!response.ok) {
              throw new Error(`${path} returned ${response.status} ${response.statusText}`);
            }
            return await response.json();
          }

          const home = await fetchText("/");
          if (!home.includes("<title>ClawHub")) {
            throw new Error("Preview home page did not render the ClawHub shell");
          }

          const detail = await fetchJson("/api/v1/skills/gifgrep");
          if (detail?.skill?.slug !== "gifgrep") {
            throw new Error(`Expected gifgrep API detail, received ${JSON.stringify(detail)}`);
          }

          const skillFile = await fetchText("/api/v1/skills/gifgrep/file?path=SKILL.md");
          if (!skillFile.trim()) {
            throw new Error("Preview skill file route returned an empty SKILL.md");
          }

          console.log(
            JSON.stringify(
              {
                previewUrl: base.toString(),
                skillSlug: detail.skill.slug,
                ownerHandle: detail.owner?.handle ?? null,
                latestVersion: detail.latestVersion?.version ?? null,
                skillFileBytes: skillFile.length,
              },
              null,
              2,
            ),
          );
          TS

      - name: Write proof summary
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          {
            echo "## Preview proof"
            echo
            echo "- Git SHA: \`${actual_sha}\`"
            echo "- Preview URL: ${PREVIEW_URL}"
            echo "- Verified routes: \`/\`, \`/api/v1/skills/gifgrep\`, \`/api/v1/skills/gifgrep/file?path=SKILL.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

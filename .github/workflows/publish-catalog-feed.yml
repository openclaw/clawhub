name: Publish Hosted Catalog Feed

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      expires_in_days:
        description: "How long the published feed remains fresh"
        required: true
        default: "7"
        type: string

concurrency:
  group: publish-catalog-feed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require main ref for production publication
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Production catalog publications must run from main."
            exit 1
          fi

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-ref
    environment:
      name: Production
      url: https://registry.openclaw.ai/v1/feeds/plugins
    env:
      EXPIRES_IN_DAYS: ${{ inputs.expires_in_days || '7' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install
        run: bun install --frozen-lockfile

      - name: Publish current production catalog
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$CONVEX_DEPLOY_KEY" ]]; then
            echo "::error::Missing Production environment secret CONVEX_DEPLOY_KEY"
            exit 1
          fi
          if ! [[ "$EXPIRES_IN_DAYS" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::expires_in_days must be a positive integer"
            exit 1
          fi
          expires_at="$(node -e 'const days = Number(process.env.EXPIRES_IN_DAYS); const expiresAtMs = Date.now() + days * 86400000; const expiresAt = new Date(expiresAtMs); if (!Number.isSafeInteger(days) || !Number.isFinite(expiresAtMs) || Number.isNaN(expiresAt.getTime())) { console.error("::error::expires_in_days is too large for a valid publication expiry"); process.exit(1); } console.log(expiresAt.toISOString())')"
          bunx convex run catalogFeed:publish "{\"expiresAt\":\"$expires_at\"}" --prod

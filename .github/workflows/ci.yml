name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  VITE_CONVEX_URL: https://example.invalid

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Peer deps
        run: bun run check:peers

      - name: Audit dependencies
        run: bun audit

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Dead code
        run: bun run deadcode:ci

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Coverage
        run: bun run coverage

  packages:
    name: packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Build schema package
        run: bun run --cwd packages/schema build

      - name: Verify ClawHub CLI package
        run: bun run --cwd packages/clawhub verify

  types-build:
    name: types-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Typecheck
        run: |
          bunx tsc --noEmit
          bunx tsc -p packages/schema/tsconfig.json --noEmit
          bunx tsc -p packages/clawhub/tsconfig.json --noEmit

      - name: Build app
        run: bun run build

  e2e-http:
    name: e2e-http
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: HTTP e2e
        run: bun run test:e2e

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: Build app
        run: bun run build

      - name: Browser e2e
        run: bun run test:pw

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
